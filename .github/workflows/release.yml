name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rustjay-mosh

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rustjay-mosh

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: rustjay-mosh

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rustjay-mosh.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libswscale-dev \
            libswresample-dev pkg-config

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ffmpeg-next 8.x targets FFmpeg 7.x; BtbN n7.1 builds live in dated autobuild releases, not the "latest" tag
          $releases = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases?per_page=30" `
            -Headers @{ Authorization = "token $env:GH_TOKEN"; "User-Agent" = "gh-actions" }
          $asset = $null
          foreach ($r in $releases) {
            $found = $r.assets | Where-Object { $_.name -match "ffmpeg-n7\.1-latest-win64-lgpl-shared.*\.zip" }
            if ($found) { $asset = $found[0]; break }
          }
          if (-not $asset) { throw "Could not find FFmpeg n7.1 build in recent releases" }
          Write-Host "Downloading $($asset.browser_download_url)"
          $zip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $dir = "$env:RUNNER_TEMP\ffmpeg"
          Invoke-WebRequest $asset.browser_download_url -OutFile $zip
          Expand-Archive $zip -DestinationPath $dir
          $inner = Get-ChildItem $dir -Directory | Select-Object -First 1
          echo "FFMPEG_DIR=$($inner.FullName)" >> $env:GITHUB_ENV
          echo "$($inner.FullName)\bin" >> $env:GITHUB_PATH

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package artifacts ──────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf rustjay-mosh-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          echo "ASSET=target/${{ matrix.target }}/release/rustjay-mosh-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "rustjay-mosh-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive `
            -Path "target\${{ matrix.target }}\release\${{ matrix.artifact }}" `
            -DestinationPath $name
          echo "ASSET=$name" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustjay-mosh-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
